<title>daslang</title>
<style>
  html, body { margin: 0; height: 100%; background: #0d0c0a; overflow: hidden; }
  #canvas { display: block; width: 100%; height: 100%; border: 0; outline: none; }
</style>

<body>
<!-- Minimal canvas-only shell shipped by `daspkg release wasm`. Sites embed
     this artifact in an iframe; override with release_web_shell(<path>) for a
     custom frame. -->
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<script>
  var Module = {
    canvas: (function () {
      var c = document.getElementById('canvas');
      // Keep focus on the canvas so keyboard input reaches the game.
      c.addEventListener('click', function () { c.focus(); });
      return c;
    })(),
  };
</script>
