name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Only one Pages deployment at a time
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: "SCM Checkout"
      uses: actions/checkout@v4

    - name: "Install Python dependencies"
      run: |
        pip install -r doc/requirements.txt
        pip install markdown

    - name: "Install CMake and Ninja"
      uses: lukka/get-cmake@latest

    # The host daslang now builds with dasGlfw/dasOpenGL ON so it can drive the
    # /examples game cross-compile (daspkg release wasm). dasGlfw's
    # find_package(OpenGL REQUIRED) needs the GL + X11 dev headers.
    - name: "Install OpenGL + libc++ dev libraries"
      run: |
        sudo apt-get update
        # libc++ so the wasm cross-compile host can be built with the SAME C++
        # stdlib as the emscripten target (see the host build step below).
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev xorg-dev libc++-dev libc++abi-dev

    - name: Setup Emscripten
      uses: emscripten-core/setup-emsdk@v11
      with:
        # Every emsdk pin snapshots LLVM main (not a release tag). 5.0.3
        # (clang 23.0.0git, 2026-03-13 snapshot) repeatedly broke on
        # utils/dasFormatter/ds_parser.cpp — bus-errors one run, EOF-
        # inside-`#ifndef` parse errors the next. We pinned to 4.0.23
        # (clang 22.0.0git, 2026-01-09 snapshot) but the same intermittent
        # parser failures still surfaced (~1 in 4 deploys); see run
        # https://github.com/GaijinEntertainment/daScript/actions/runs/26377946207.
        # 5.0.7 ships clang 23.0.0git snapshot 7b58716d96c3 — same major
        # family as the bad 5.0.3, but a different upstream snapshot.
        # Locally compiles ds_parser.cpp + the full daslang_static target
        # cleanly. Bump back down if 5.0.7 reintroduces the flake.
        version: '5.0.7'

    # Cache every expensive wasm artifact, keyed on the sources that affect it.
    # A doc-only push (doc/source, blog, news, *.md) leaves this key unchanged →
    # cache hit → the host build + wasm build steps below are skipped and the
    # cached binaries/archives are reused, so docs redeploy without rebuilding
    # the runtime, games, or compute samples. Any source change to the runtime,
    # modules, daslib, daspkg, or the example sources misses the key → full rebuild.
    - name: "Cache wasm build artifacts"
      id: wasm-cache
      uses: actions/cache@v4
      with:
        path: |
          bin
          modules/dasGlfw/dasModuleGlfw.shared_module
          modules/dasOpenGL/dasModuleOpenGL.shared_module
          web/output
          web/output64
          site/playground/samples
          site/playground/tutorials
        key: wasm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'web/CMakeLists.txt', 'web/stage_playground_imgui_samples.cmake', 'src/**', 'include/**', 'modules/**', 'daslib/**', 'utils/daspkg/**', 'examples/games/**', 'examples/graphics/**', 'examples/pathTracer/**', 'web/examples/ui/samples/**', 'tutorials/**', 'dastest/**') }}

    # Host daslang — one games-capable build (dasLLVM for cross-compile + dasGlfw
    # + dasOpenGL shared modules for the games) that serves BOTH das2rst and the
    # wasm cross-compile. Skipped on a cache hit (the cached bin/ + shared modules
    # are restored; das2rst below still runs against them).
    - name: "Build: Daslang host (+ glfw/opengl shared modules)"
      if: steps.wasm-cache.outputs.cache-hit != 'true'
      run: |
        set -eux
        mkdir -p build
        # This is the wasm CROSS-COMPILE host: `daspkg build --wasm` below runs it
        # to JIT-codegen the .das games/samples to wasm64, baking C++ handled-type
        # layouts (Context, jobque, std::string-bearing structs) from the HOST's
        # ABI. The emscripten target is libc++ + C++ exceptions (-fwasm-exceptions
        # + DAS_ENABLE_EXCEPTIONS, see web/CMakeLists.txt); a default libstdc++ +
        # setjmp host bakes the WRONG offsets/sizes (std::string 32 vs 24, mutex 80
        # vs 40, exception state) -> wasm heap corruption. Building the host libc++
        # + exceptions makes host==target layout (verified: zero handled-type
        # divergence on every runtime-live type; only the compiler-only Program
        # residual remains).
        # /usr/bin/clang (absolute): setup-emsdk prepends its LLVM snapshot to PATH, so a
        # bare `clang` resolves to emsdk's (flaky on ds_parser.cpp, see version note above).
        # /usr/bin/clang is the runner-image clang every other Linux clang job uses
        # (build.yml, extended_checks.yml), paired with the apt libc++ installed above.
        # NB: a `#` comment inside the `\`-continued cmake call below terminates it (exit 127).
        cmake --no-warn-unused-cli -B./build \
          -DCMAKE_BUILD_TYPE:STRING=Release \
          -DCMAKE_C_COMPILER=/usr/bin/clang -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
          -DCMAKE_C_FLAGS="-DDAS_ENABLE_EXCEPTIONS=1" \
          -DCMAKE_CXX_FLAGS="-stdlib=libc++ -DDAS_ENABLE_EXCEPTIONS=1 -D_LIBCPP_DISABLE_DEPRECATION_WARNINGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
          -DCMAKE_SHARED_LINKER_FLAGS="-stdlib=libc++" \
          -DDAS_HV_DISABLED=OFF \
          -DDAS_PUGIXML_DISABLED=OFF \
          -DDAS_LLVM_DISABLED=OFF \
          -DDAS_GLFW_DISABLED=OFF \
          -G Ninja
        cmake --build ./build --target daslang dasModuleGlfw dasModuleOpenGL

    - name: "Run das2rst"
      run: |
        set -eux
        ./bin/daslang doc/reflections/das2rst.das

    - name: "Build Sphinx HTML"
      run: |
        sphinx-build -W --keep-going -b html -d doc/sphinx-build doc/source build/site

    - name: "Build Sphinx LaTeX"
      run: |
        sphinx-build -W --keep-going -b latex -d doc/sphinx-build doc/source build/latex

    - name: "Compile PDF: daslangstdlib.tex"
      uses: xu-cheng/latex-action@v4
      with:
        root_file: daslangstdlib.tex
        working_directory: build/latex
        continue_on_error: true

    - name: "Compile PDF: daslang.tex"
      uses: xu-cheng/latex-action@v4
      with:
        root_file: daslang.tex
        working_directory: build/latex
        continue_on_error: true

    # WASM build: the wasm32 interpreter playground (daslang_static) + the wasm64
    # compiled path (runtime/module archives, compute samples, and the /examples
    # games). Skipped on a cache hit — the cached web/output + web/output64 are
    # reused. wasm32 is the universal interpreter fallback; everything COMPILED
    # is wasm64 (the cross-compile is layout-correct only when host ptr width ==
    # target ptr width).
    - name: "Build WASM (Emscripten): playground + wasm64 examples"
      if: steps.wasm-cache.outputs.cache-hit != 'true'
      run: |
        set -eux
        REPO="$PWD"

        # 0. dasImgui for the playground showcases (furier, path_tracer_lab). The threaded
        #    daslang_static interpreter binds it so those samples run in the playground itself —
        #    not only as the wasm64 examples-card builds. daspkg installs dasImgui from the package
        #    index into the path_tracer_lab package; build its threaded wasm32 archives (-pthread,
        #    no memory64 -> _wasm32mt) so the ABI matches the threaded daslang_static. If any of
        #    this fails (e.g. the dasImgui wasm release isn't in the index yet), fall back to a
        #    plain single-thread daslang_static so the rest of the playground still deploys; only
        #    the two imgui samples are unavailable that deploy (same non-fatal stance as the cards).
        IMGUI_DIR="$REPO/examples/graphics/path_tracer_lab/modules/dasImgui"
        PLAYGROUND_IMGUI=""
        if ./bin/daslang utils/daspkg/main.das -- install --root examples/graphics/path_tracer_lab \
           && ( cd "$IMGUI_DIR" \
                && emcmake cmake -S . -B _wasm_build32mt -G Ninja -DCMAKE_BUILD_TYPE=Release \
                     -DDASLANG_DIR="$REPO" -DDAS_IMGUI_WASM_MEMORY64=OFF -DDAS_IMGUI_WASM_PTHREADS=ON \
                && cmake --build _wasm_build32mt --target dasModuleImgui imguiApp imguiAppHeadless ); then
            PLAYGROUND_IMGUI="-DDAS_WASM_PTHREADS=ON -DDAS_WEB_IMGUI_DIR=$IMGUI_DIR"
            echo "playground: threaded daslang_static + dasImgui bound (furier + path_tracer_lab enabled)"
        else
            echo "WARNING: dasImgui wasm32mt archives unavailable — building plain daslang_static; the furier + path_tracer_lab playground samples will not run this deploy."
        fi

        # 1. wasm32 interpreter playground (daslang_static) + vendored UI + the example .das
        #    sources staged into site/playground. When the dasImgui archives built above, this is
        #    the THREADED build (-pthread + dasImgui), so new_thread / JobQue map to Web Workers and
        #    every playground sample runs cross-origin-isolated (coi-serviceworker drops the
        #    memory64 gate for /playground). stage_site_playground also generates the furier +
        #    path_tracer_lab samples from the canonical examples/graphics sources.
        #    (stage_site_playground_wasm is gone — compute samples are wasm64 now, built below;
        #    it is gated off under non-memory64 in web/CMakeLists.)
        ( cd web && mkdir -p build && cd build \
            && emcmake cmake -DCMAKE_BUILD_TYPE=Release -G Ninja $PLAYGROUND_IMGUI .. \
            && ninja daslang_static stage_site_playground )

        # 2. wasm64 archives + compute samples + games. Configure web/build64 with
        #    the prebuilt host (so the compute foreach reuses it instead of
        #    rebuilding daslang) + memory64; daspkg build --wasm then populates the
        #    runtime/module archives into it.
        emcmake cmake -S web -B web/build64 -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DDAS_WEB_OUTPUT_DIR="$REPO/web/output64" \
          -DDAS_WASM_MEMORY64=ON \
          -DCMAKE_CXX_FLAGS=-sMEMORY64=1 -DCMAKE_C_FLAGS=-sMEMORY64=1 \
          -DDAS_HOST_DASLANG_OVERRIDE="$REPO/bin/daslang"
        ./bin/daslang utils/daspkg/main.das -- build --wasm

        # 3. compute playground samples → wasm64 (web/output64/samples/examples)
        cmake --build web/build64 --target all_wasm

        # 4. /examples games → standalone wasm64 web apps (web/output64/examples/<g>/)
        for g in arcanoid pacman; do
            ./bin/daslang utils/daspkg/main.das -- \
                release wasm --root "examples/games/$g" --out "$REPO/web/output64/examples"
        done

        # 5. /examples furier — the ImGui-in-wasm showcase. Unlike the games (all
        #    in-tree modules), furier pulls the EXTERNAL dasImgui module: install
        #    its deps from the package index into the package dir, then release.
        #    dasImgui's own .das_package builds its 3 wasm64 archives on demand
        #    (release_wasm_build). Non-fatal — it depends on dasImgui shipping the
        #    wasm-support release in the package index, so a dep/index hiccup must
        #    not red the whole deploy; the furier card is skipped at stage time
        #    below (examples.js shows a "needs memory64" note when the iframe is
        #    unavailable).
        if ./bin/daslang utils/daspkg/main.das -- install --root examples/graphics/furier \
           && ./bin/daslang utils/daspkg/main.das -- \
                release wasm --root examples/graphics/furier --out "$REPO/web/output64/examples"; then
            echo "furier wasm build OK"
        else
            echo "WARNING: furier wasm build failed (dasImgui wasm release not in the package index yet?) — its examples card will be skipped this deploy."
        fi

        # 6. /examples path_tracer_lab — the jobque + OpenGL showcase. Same external
        #    dasImgui dependency as furier; the threaded daspkg wasm pipeline (always
        #    -pthread, see step 2) maps its new_thread / JobQue modes to real Web
        #    Workers. Non-fatal for the same reason as furier; staged below only when
        #    all three outputs are present. The page serves it cross-origin-isolated
        #    via coi-serviceworker.js (required for the -pthread module to instantiate).
        if ./bin/daslang utils/daspkg/main.das -- install --root examples/graphics/path_tracer_lab \
           && ./bin/daslang utils/daspkg/main.das -- \
                release wasm --root examples/graphics/path_tracer_lab --out "$REPO/web/output64/examples"; then
            echo "path_tracer_lab wasm build OK"
        else
            echo "WARNING: path_tracer_lab wasm build failed (dasImgui wasm release not in the package index yet?) — its examples card will be skipped this deploy."
        fi

    - name: "Fetch dasProfile per-platform benchmark JSONs"
      # dasProfile now ships a per-platform JSON file
      # (profile_results_<platform>.json). forge.js's bench cycler fetches
      # each one and renders a platform-list rail. Add `linux` to the loop
      # below when a Linux capture lands upstream. Missing-platform files
      # don't abort the build — the cycler silently drops them client-side.
      run: |
        set -eux
        for plat in darwin windows; do
            curl -sSL -o "site/files/profile_results_${plat}.json" \
                "https://raw.githubusercontent.com/borisbat/dasProfile/main/profile_results_${plat}.json" \
              || echo "WARNING: missing profile_results_${plat}.json"
        done
      continue-on-error: true

    - name: "Stage site for deployment"
      run: |
        set -eux
        mkdir -p _site

        # Static landing page and assets
        cp site/index.html _site/
        cp site/downloads.html _site/
        cp site/daspkg.html _site/
        cp site/examples.html _site/
        cp site/robots.txt _site/
        cp -r site/files _site/files

        # Cross-origin isolation worker — must sit at site root so its scope (/) can
        # control the root-level /examples.html navigation. It only rewrites headers
        # under /examples* and /playground* (the threaded -pthread wasm subtrees);
        # every other page passes through untouched. See site/coi-serviceworker.js.
        cp site/coi-serviceworker.js _site/coi-serviceworker.js

        # Freshly-built Sphinx HTML docs
        cp -r build/site _site/doc

        # PDFs (referenced by index.html)
        cp build/latex/daslang.pdf _site/doc/daslang.pdf || echo "WARNING: daslang.pdf not found"
        cp build/latex/daslangstdlib.pdf _site/doc/daslangstdlib.pdf || echo "WARNING: daslangstdlib.pdf not found"

        # Blog + news + changelist (regenerated each publish). Pin --site-url
        # explicitly so feed.xml entries point at the production domain even
        # if the default in build_blog.py drifts.
        python3 site/blog/build_blog.py \
            --posts site/blog/_posts \
            --news site/_news \
            --template site/blog/template.html \
            --site-url https://daslang.io \
            --out _site/

        # Playground: vendor web/ui IDE + WASM artifacts.
        # The WASM build step now fails the workflow (no continue-on-error),
        # so under normal master deploys we always take the if-branch. The
        # else-branch survives as defense-in-depth — if the artifacts ever
        # go missing despite a green build, we stage a placeholder rather
        # than 404'ing the route (actions/deploy-pages publishes _site as
        # a complete snapshot, no layering over the prior deploy).
        if [ -f web/output/daslang_static.js ] && [ -f web/output/daslang_static.wasm ]; then
            mkdir -p _site/playground _site/files/wasm
            # Copy IDE source files (CodeMirror, jQuery, main.js/css, etc.)
            cp -r web/examples/ui/src/* _site/playground/
            # Copy WASM artifacts — known-present after the guard above.
            cp web/output/daslang_static.js _site/playground/
            cp web/output/daslang_static.wasm _site/playground/
            cp web/output/daslang_static.js _site/files/wasm/
            cp web/output/daslang_static.wasm _site/files/wasm/
            # Pull samples from site/playground/samples — that directory is the
            # single staged source of truth: stage_site_playground populates
            # the .das sources. Overlay the wasm64 compute .wasm built above.
            cp -r site/playground/samples _site/playground/samples 2>/dev/null || true
            if [ -d web/output64/samples/examples ]; then
                mkdir -p _site/playground/samples/examples
                cp web/output64/samples/examples/*.wasm _site/playground/samples/examples/ 2>/dev/null || true
            fi
            # Tutorial assets (mesh + PBR textures + HDRI) fetched at runtime by
            # samples that ship a .das.assets.json manifest (the OpenGL
            # deferred-shading rung). stage_site_playground staged them under
            # site/playground/tutorials/_assets; the manifest names them at the
            # repo-relative path tutorials/_assets/..., so preserve that layout.
            # Without this the manifest 200s but every asset fetch 404s — so make
            # a missing dir loud (warn) rather than silently shipping a broken
            # rung; an actual copy failure fails the step under set -eo pipefail.
            if [ -d site/playground/tutorials ]; then
                cp -r site/playground/tutorials _site/playground/tutorials
            else
                echo "WARNING: site/playground/tutorials missing — manifest-driven samples (e.g. the OpenGL deferred rung) will 404 their assets."
            fi
            # Our Forge-skinned playground/index.html + skin CSS + init shim take precedence.
            # CodeMirror bundle (codemirror.min.js/css, simple-mode.js, daslang-*.js,
            # cm-forge.css) is served from /files/cm/ — copied via `cp -r site/files`
            # earlier, so nothing extra to copy here.
            cp site/playground/index.html _site/playground/index.html
            cp site/playground/forge-skin.css _site/playground/
            # Forge playground scripts (init shim + tabs + share + splitter).
            # Glob so future playground-*.js additions land automatically.
            cp site/playground/playground-*.js _site/playground/
        else
            # WASM artifacts missing. actions/deploy-pages publishes _site as
            # a complete snapshot (no layering over the prior deploy), so an
            # absent _site/playground/ would 404 the route. Stage a
            # placeholder instead — the URL keeps resolving to something
            # useful while we re-roll the runtime.
            echo "WARNING: daslang_static.{js,wasm} missing under web/output — staging placeholder /playground/."
            mkdir -p _site/playground
            cp site/playground/placeholder.html _site/playground/index.html
        fi

        # /examples/ runtime: the interpreted runner harness + per-game artifacts.
        # Each game dir holds BOTH the compiled wasm64 build (loaded in an iframe on
        # memory64 engines) AND the .das sources + HUD font the interpreted fallback
        # (_interp.html) mounts on Safari/iOS. The page UI (examples.html, posters,
        # files/examples.js) was already staged above via cp site/examples.html +
        # cp -r site/files.
        mkdir -p _site/examples
        cp site/examples/_interp.html _site/examples/_interp.html
        for g in arcanoid pacman; do
            mkdir -p "_site/examples/$g"
            if [ -f "web/output64/examples/$g/$g.wasm" ]; then
                cp "web/output64/examples/$g/$g.html" "_site/examples/$g/"
                cp "web/output64/examples/$g/$g.js"   "_site/examples/$g/"
                cp "web/output64/examples/$g/$g.wasm" "_site/examples/$g/"
            else
                echo "WARNING: web/output64/examples/$g/$g.wasm missing — $g card will fall back to interpreted only."
            fi
            # Interpreted-fallback sources + HUD font (fetched by _interp.html).
            cp "web/examples/ui/samples/examples/$g/main.das"      "_site/examples/$g/"
            cp "web/examples/ui/samples/examples/$g/live_stub.das" "_site/examples/$g/"
            cp modules/dasStbImage/fonts/droidsansmono.ttf         "_site/examples/$g/"
        done

        # furier — the ImGui-in-wasm showcase. wasm64-only: it bundles the external
        # dasImgui module, which the universal interpreter can't bind, so there is NO
        # interpreted fallback (no .das sources to stage). The card is always listed
        # in examples.js, so stage the compiled build only when ALL THREE outputs are
        # present; otherwise stage a small placeholder furier.html so a memory64 engine
        # loads a friendly "being rebuilt" note instead of 404-ing the iframe (and
        # flipping the player to a bogus "running" on the 404 page's load event).
        mkdir -p _site/examples/furier
        if [ -f web/output64/examples/furier/furier.html ] \
           && [ -f web/output64/examples/furier/furier.js ] \
           && [ -f web/output64/examples/furier/furier.wasm ]; then
            cp web/output64/examples/furier/furier.html _site/examples/furier/
            cp web/output64/examples/furier/furier.js   _site/examples/furier/
            cp web/output64/examples/furier/furier.wasm _site/examples/furier/
        else
            echo "WARNING: furier wasm build incomplete — staging a placeholder so the always-listed card doesn't 404."
            printf '%s' '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Fourier Series — building</title><style>html,body{margin:0;height:100%}body{background:#0d0c0a;color:#cfc8bb;font-family:ui-monospace,Menlo,Consolas,monospace;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}p{max-width:30rem;line-height:1.6}</style></head><body><p>This example is being rebuilt and will be available shortly.</p></body></html>' > _site/examples/furier/furier.html
        fi

        # path_tracer_lab — the jobque + OpenGL showcase. Same wasm64-only / external
        # dasImgui story as furier (no interpreted fallback): stage the compiled build
        # only when all three outputs are present, else a "being rebuilt" placeholder so
        # the always-listed card never 404s its iframe.
        mkdir -p _site/examples/path_tracer_lab
        if [ -f web/output64/examples/path_tracer_lab/path_tracer_lab.html ] \
           && [ -f web/output64/examples/path_tracer_lab/path_tracer_lab.js ] \
           && [ -f web/output64/examples/path_tracer_lab/path_tracer_lab.wasm ]; then
            cp web/output64/examples/path_tracer_lab/path_tracer_lab.html _site/examples/path_tracer_lab/
            cp web/output64/examples/path_tracer_lab/path_tracer_lab.js   _site/examples/path_tracer_lab/
            cp web/output64/examples/path_tracer_lab/path_tracer_lab.wasm _site/examples/path_tracer_lab/
        else
            echo "WARNING: path_tracer_lab wasm build incomplete — staging a placeholder so the always-listed card doesn't 404."
            printf '%s' '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Path Tracer Lab — building</title><style>html,body{margin:0;height:100%}body{background:#0d0c0a;color:#cfc8bb;font-family:ui-monospace,Menlo,Consolas,monospace;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}p{max-width:30rem;line-height:1.6}</style></head><body><p>This example is being rebuilt and will be available shortly.</p></body></html>' > _site/examples/path_tracer_lab/path_tracer_lab.html
        fi

        # GitHub Pages control files
        touch _site/.nojekyll

    - name: "Upload Pages artifact"
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: "Deploy to GitHub Pages"
      id: deployment
      uses: actions/deploy-pages@v4
