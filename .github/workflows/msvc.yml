name: Microsoft C++ Code Analysis

on: [ workflow_dispatch ]

permissions:
  contents: read

jobs:
  analyze:
    env:
      CONFIG_DIR: '${{ github.workspace }}/build'

    permissions:
      contents: read
      security-events: write

    name: ${{ matrix.target }} - ${{ matrix.cmake_configuration }}
    runs-on: ${{ matrix.target }}

    strategy:
      fail-fast: false
      matrix:
        target: [ windows-latest ]
        cmake_configuration: [ Debug, Release ]

    steps:
    - uses: actions/checkout@v4

    - name: "Exclude workspace from Windows Defender"
      if: runner.os == 'Windows'
      shell: pwsh
      continue-on-error: true
      # Defender real-time scan of freshly-written .obj/.exe/.dll slows the build
      # and can momentarily lock a just-linked exe (the "Access is denied" deploy
      # race). Exclude the workspace + toolchain writers and try to disable RTP;
      # the status dump records whether the runner image actually honored it
      # (managed Defender / Tamper Protection may silently no-op).
      # continue-on-error: a managed-Defender runner must not fail the job.
      run: |
        Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
        foreach ($p in 'daslang.exe','daslang_static.exe','test_aot.exe','cl.exe','link.exe','lld-link.exe','mt.exe','vctip.exe','mspdbsrv.exe','vcpkg.exe') {
          Add-MpPreference -ExclusionProcess $p -ErrorAction SilentlyContinue
        }
        Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
        Get-MpComputerStatus | Select-Object RealTimeProtectionEnabled, IsTamperProtected
        Get-MpPreference | Select-Object -ExpandProperty ExclusionPath

    - name: Configure CMake
      # Generator pinned to the VS major on the windows-latest image. GitHub
      # migrated it from VS2022 (v17) to VS2026 (v18); bump in lockstep (see
      # build.yml's build_windows_clangcl). On a mismatch, configure dies at
      # project() with "could not find any instance of Visual Studio".
      run: cmake -B ${{ env.CONFIG_DIR }} -DCMAKE_BUILD_TYPE:STRING=${{ matrix.cmake_configuration }} -G "Visual Studio 18 2026"

    - name: Build CMake
      run: cmake --build ${{ env.CONFIG_DIR }} --config ${{ matrix.cmake_configuration }}

    - name: Initialize MSVC Code Analysis
      uses: microsoft/msvc-code-analysis-action@v0.1.1
      # Provide a unique ID to access the sarif output path
      id: run-analysis
      with:
        cmakeBuildDirectory: ${{ env.CONFIG_DIR }}
        buildConfiguration: '${{ matrix.cmake_configuration }}'
        # Ruleset file that will determine what checks will be run
        ruleset: CustomRules.ruleset

    # Upload SARIF file to GitHub Code Scanning Alerts
    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.run-analysis.outputs.sarif }}

    # Upload SARIF file as an Artifact to download and view
    - name: Upload SARIF as an Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarif-file
        path: ${{ steps.run-analysis.outputs.sarif }}
