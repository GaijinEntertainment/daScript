<!-- ───── IDE (from web/ui — content copied by pages.yml) ───── -->
<script type="text/javascript" src="./jquery-3.6.0.min.js"></script>
<script type="text/javascript" src="../files/cm/codemirror.min.js"></script>
<script type="text/javascript" src="../files/cm/simple-mode.js"></script>
<script type="text/javascript" src="../files/cm/daslang-keywords.js"></script>
<script type="text/javascript" src="../files/cm/daslang-mode.js"></script>
<script type="text/javascript" src="../files/lz-string.min.js"></script>
<script type="text/javascript" src="./playground-init.js"></script>
<script type="text/javascript" src="./main.js"></script>
<script type="text/javascript" src="./playground-tabs.js?v=2"></script>
<script type="text/javascript" src="./playground-share.js?v=3"></script>
<script type="text/javascript" src="./playground-splitter.js?v=3"></script>

<div class="main">
    <div class="main_header">
        <div class="main_header_left">
            <div class="main_header_part">
                <div id="pg-tabs" class="pg-tabs"></div>
            </div>
            <div class="main_header_part">
                <select id="examples" class="select_header" onchange="selectSample('examples')"></select>
            </div>
            <div class="main_header_part">
                <button id="share" class="button_header button_header--ghost" type="button">↗ share</button>
            </div>
            <div class="main_header_part">
                <button id="run" class="button_header" onclick="runCode()" disabled>▶ run</button>
            </div>
            <div class="main_header_part">
                <button id="test" class="button_header" onclick="runTests()" disabled>▶ test</button>
            </div>
            <div class="main_header_part engine-toggle">
                <label><input type="radio" name="engine" value="interpreter" checked> interpreter</label>
                <label><input type="radio" name="engine" value="jit" disabled> JIT (wasm)</label>
            </div>
        </div>
        <div class="main_header_right">
            <button id="clear" class="button_header button_header--ghost" onclick="clearOutput()">clear</button>
        </div>
    </div>
    <div class="main_workspace">
        <div class="main_col">
            <div class="main_col_part">
                <div id="code"></div>
            </div>
        </div>
        <div class="main_col">
            <div class="main_col_part">
                <div id="output"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <p class="footer_p">
        daslang playground · WebAssembly · powered by Emscripten ·
        <a href="https://github.com/GaijinEntertainment/daScript" style="color: var(--amber); border-bottom: 1px solid var(--amber-dim);">source on GitHub</a>
    </p>
</footer>

</body>
</html>
